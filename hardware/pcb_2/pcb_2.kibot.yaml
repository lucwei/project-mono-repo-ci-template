
kibot:
  version: 1

outputs:

  # -------------------------------------------------------
  # Schematic PDF
  # -------------------------------------------------------
  - name: print_sch
    comment: Schematic in PDF format
    type: pdf_sch_print
    dir: schematic

  # -------------------------------------------------------
  # Gerbers
  # -------------------------------------------------------
  - name: gerbers
    comment: Gerber files for fabrication
    type: gerber
    dir: fabrication/gerbers
    layers:
      - F.Cu
      - B.Cu
      - F.Silkscreen
      - B.Silkscreen
      - F.Mask
      - B.Mask
      - F.Paste
      - B.Paste
      - Edge.Cuts
      - F.Courtyard
      - B.Courtyard

  - name: drill
    comment: Drill files
    type: excellon
    dir: fabrication/gerbers

  - name: gerber_zip
    comment: Zip of all gerbers + drill files
    type: compress
    dir: fabrication
    options:
      files:
        - from_output: gerbers
        - from_output: drill

  # -------------------------------------------------------
  # PCB Render (2D)
  # -------------------------------------------------------
  - name: pcb_render_top
    comment: 2D render of PCB top side
    type: pcbdraw
    dir: renders
    options:
      format: png
      dpi: 300
      style: set-blue-enig
      show_components: all

  - name: pcb_render_bottom
    comment: 2D render of PCB bottom side
    type: pcbdraw
    dir: renders
    options:
      format: png
      dpi: 300
      style: set-blue-enig
      show_components: all
      bottom: true

  # -------------------------------------------------------
  # PCB Render (3D)
  # -------------------------------------------------------
  - name: pcb_render_3d_top
    comment: 3D render of PCB top side
    type: render_3d
    dir: renders
    options:
      ray_tracing: true
      orthographic: false
      view: top

  - name: pcb_render_3d_bottom
    comment: 3D render of PCB bottom side
    type: render_3d
    dir: renders
    options:
      ray_tracing: true
      orthographic: false
      view: bottom
