# hw_fabrication.yaml
name: Fabrication

on:
# ---------------------------------------------------------
# Trigger on PRs to main that modify hardware files and
# also allow manual triggering
# ---------------------------------------------------------
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths: ['hardware/**']


jobs:
  # -------------------------------------------------------
  # Step 1: discover all KiCad projects in hardware/
  #   - looks for hardware/<name>/<name>.kicad_pro files
  #   - on pull_request: only includes boards with changed files
  #   - on workflow_dispatch: includes all boards
  # -------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find_boards.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find KiCad projects
        id: find_boards
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          fi

          BOARDS="[]"
          for dir in hardware/*/; do
            name=$(basename "$dir")
            if [ -f "${dir}${name}.kicad_pro" ]; then
              if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
                 echo "$CHANGED" | grep -q "^hardware/${name}/"; then
                BOARDS=$(echo "$BOARDS" | jq --arg n "$name" --arg p "${dir%/}" '. + [{"name": $n, "path": $p}]')
              fi
            fi
          done

          MATRIX=$(jq -cn --argjson b "$BOARDS" '{"board": $b}')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Print discovered boards
        run: echo "Found boards ${{ steps.find_boards.outputs.matrix }}"

  # -------------------------------------------------------
  # Step 2: run fabrication for each discovered board
  # -------------------------------------------------------
  Fabrication:
    needs: discover
    if: ${{ fromJson(needs.discover.outputs.matrix).board[0] != null }}
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate outputs
        working-directory: ${{ matrix.board.path }}
        run: |
          kibot \
            -c ../../.kibot/kibot.yaml \
            -b ${{ matrix.board.name }}.kicad_pcb \
            -e ${{ matrix.board.name }}.kicad_sch

      - name: List generated files
        if: always()
        run: find ${{ matrix.board.path }} -type f

      - name: Upload renders
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: renders_${{ matrix.board.name }}
          path: ${{ matrix.board.path }}/renders

      - name: Upload schematic
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: schematic_${{ matrix.board.name }}
          path: ${{ matrix.board.path }}/schematic

      - name: Upload iBOM and BOMs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ibom_${{ matrix.board.name }}
          path: ${{ matrix.board.path }}/bom

      - name: Upload fabrication outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fabrication_output_${{ matrix.board.name }}
          path: ${{ matrix.board.path }}/fabrication

      - name: Upload ERC/DRC checks
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checks_${{ matrix.board.name }}
          path: ${{ matrix.board.path }}/checks

      - name: Upload navigate_results webpage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web_${{ matrix.board.name }}
          path: ${{ matrix.board.path }}/web

      - name: Write build status
        if: always()
        run: |
          mkdir -p /tmp/status
          echo "${{ job.status }}" > /tmp/status/result.txt

      - name: Upload build status
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: status_${{ matrix.board.name }}
          path: /tmp/status/result.txt

  # -------------------------------------------------------
  # Step 3: commit all outputs after all boards are done
  #         - avoids race conditions on parallel board jobs
  # -------------------------------------------------------
  commit:
    needs: [discover, Fabrication]
    if: ${{ always() && needs.Fabrication.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download all renders
        uses: actions/download-artifact@v4
        with:
          pattern: renders_*
          merge-multiple: false
          path: downloaded/renders

      - name: Download all schematics
        uses: actions/download-artifact@v4
        with:
          pattern: schematic_*
          merge-multiple: false
          path: downloaded/schematics

      - name: Download all iBOMs and BOMs
        uses: actions/download-artifact@v4
        with:
          pattern: ibom_*
          merge-multiple: false
          path: downloaded/ibom

      - name: Download all fabrication outputs
        uses: actions/download-artifact@v4
        with:
          pattern: fabrication_output_*
          merge-multiple: false
          path: downloaded/fabrication

      - name: Download all ERC/DRC checks
        uses: actions/download-artifact@v4
        with:
          pattern: checks_*
          merge-multiple: false
          path: downloaded/checks

      - name: Download all navigate_results webpages
        uses: actions/download-artifact@v4
        with:
          pattern: web_*
          merge-multiple: false
          path: downloaded/web

      - name: Download all build statuses
        uses: actions/download-artifact@v4
        with:
          pattern: status_*
          merge-multiple: false
          path: downloaded/status

      - name: Copy files back to hardware folders
        run: |
          find downloaded/renders -type f | while read f; do
            BOARD=$(echo "$f" | cut -d'/' -f3 | sed 's/^renders_//')
            mkdir -p hardware/$BOARD/renders
            cp "$f" hardware/$BOARD/renders/
          done
          find downloaded/schematics -type f | while read f; do
            BOARD=$(echo "$f" | cut -d'/' -f3 | sed 's/^schematic_//')
            mkdir -p hardware/$BOARD/schematic
            cp "$f" hardware/$BOARD/schematic/
          done
          find downloaded/ibom -type f | while read f; do
            BOARD=$(echo "$f" | cut -d'/' -f3 | sed 's/^ibom_//')
            mkdir -p hardware/$BOARD/bom
            cp "$f" hardware/$BOARD/bom/
          done
          find downloaded/fabrication -mindepth 2 -type f | while read f; do
            BOARD=$(echo "$f" | cut -d'/' -f3 | sed 's/^fabrication_output_//')
            REL=$(echo "$f" | cut -d'/' -f4-)
            mkdir -p "hardware/$BOARD/fabrication/$(dirname "$REL")"
            cp "$f" "hardware/$BOARD/fabrication/$REL"
          done
          find downloaded/checks -type f | while read f; do
            BOARD=$(echo "$f" | cut -d'/' -f3 | sed 's/^checks_//')
            mkdir -p hardware/$BOARD/checks
            cp "$f" hardware/$BOARD/checks/
          done
          find downloaded/web -mindepth 2 -type f | while read f; do
            BOARD=$(echo "$f" | cut -d'/' -f3 | sed 's/^web_//')
            REL=$(echo "$f" | cut -d'/' -f4-)
            mkdir -p "hardware/$BOARD/web/$(dirname "$REL")"
            cp "$f" "hardware/$BOARD/web/$REL"
          done

          # Generate per-board fabrication status badges
          for STATUS_DIR in downloaded/status/*/; do
            BOARD=$(basename "$STATUS_DIR" | sed 's/^status_//')
            STATUS=$(cat "${STATUS_DIR}result.txt" 2>/dev/null | tr -d '[:space:]' || echo "unknown")
            case "$STATUS" in
              success) MSG="passing"; COLOR="brightgreen" ;;
              failure) MSG="failing";  COLOR="red" ;;
              *)        MSG="unknown"; COLOR="lightgrey" ;;
            esac
            mkdir -p "hardware/$BOARD"
            curl -sf -o "hardware/$BOARD/fabrication-badge.svg" \
              "https://img.shields.io/badge/fabrication-${MSG}-${COLOR}.svg" || \
            printf '<svg xmlns="http://www.w3.org/2000/svg" width="130" height="20"><rect width="130" height="20" fill="#555" rx="3"/><rect x="82" width="48" height="20" fill="%s" rx="3"/><rect x="82" width="4" height="20" fill="%s"/><g fill="#fff" font-family="DejaVu Sans,sans-serif" font-size="11" text-anchor="middle"><text x="41" y="14">fabrication</text><text x="106" y="14">%s</text></g></svg>' \
              "${COLOR}" "${COLOR}" "${MSG}" > "hardware/$BOARD/fabrication-badge.svg"
          done

      - name: Update README with renders
        run: |
          # Build the new PCB section
          PCB_SECTION=""
          for BOARD_DIR in hardware/*/; do
            BOARD_NAME=$(basename $BOARD_DIR)
            # Only process folders that have renders
            if [ -d "${BOARD_DIR}renders" ]; then
              PCB_SECTION="${PCB_SECTION}\n## ${BOARD_NAME}\n"
              PCB_SECTION="${PCB_SECTION}![Fabrication](${BOARD_DIR}fabrication-badge.svg)\n\n"
              PCB_SECTION="${PCB_SECTION}| 2D Top | 2D Bottom |\n"
              PCB_SECTION="${PCB_SECTION}|--------|----------|\n"
              PCB_SECTION="${PCB_SECTION}| ![2D Top](${BOARD_DIR}renders/${BOARD_NAME}-top.png) | ![2D Bottom](${BOARD_DIR}renders/${BOARD_NAME}-bottom.png) |\n\n"
              PCB_SECTION="${PCB_SECTION}| 3D Top | 3D Bottom |\n"
              PCB_SECTION="${PCB_SECTION}|--------|----------|\n"
              PCB_SECTION="${PCB_SECTION}| ![3D Top](${BOARD_DIR}renders/${BOARD_NAME}-3D_top.png) | ![3D Bottom](${BOARD_DIR}renders/${BOARD_NAME}-3D_bottom.png) |\n\n"
            fi
          done

          # Replace everything between the markers in README.md
          python3 - <<EOF
          import re
          with open('README.md', 'r') as f:
              content = f.read()
          new_section = "<!-- PCB_RENDERS_START -->\n${PCB_SECTION}\n<!-- PCB_RENDERS_END -->"
          content = re.sub(
              r'<!-- PCB_RENDERS_START -->.*?<!-- PCB_RENDERS_END -->',
              new_section,
              content,
              flags=re.DOTALL
          )
          with open('README.md', 'w') as f:
              f.write(content)
          EOF

      - name: Commit outputs and README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch origin ${{ steps.branch.outputs.branch }}
          git checkout ${{ steps.branch.outputs.branch }}
          git add hardware/*/renders hardware/*/schematic hardware/*/bom hardware/*/fabrication hardware/*/checks hardware/*/web hardware/*/fabrication-badge.svg
          git add README.md
          git diff --cached --quiet || git commit -m "ci: update renders, schematics, and iBOM [skip ci]"
          git push origin ${{ steps.branch.outputs.branch }}
